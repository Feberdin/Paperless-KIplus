run:
  name: Paperless KIplus Run Starten
  description: Startet das konfigurierte Paperless-KIplus-Skript.
  fields:
    entry_id:
      name: Entry ID
      description: Optional. Führt den Run nur für diese Integration-Instanz aus.
      example: "abcd1234"
      required: false
      selector:
        text:
    force:
      name: Force
      description: Ignoriert laufenden Cooldown und startet trotzdem.
      required: false
      default: false
      selector:
        boolean:
    wait:
      name: Wait
      description: Wartet synchron bis der Lauf fertig ist.
      required: false
      default: false
      selector:
        boolean:
    config_file:
      name: Config File
      description: Optional. Überschreibt den YAML-Pfad nur für diesen Lauf.
      required: false
      example: "/config/paperless-kiplus/config.yaml"
      selector:
        text:
    dry_run:
      name: Dry Run Override
      description: Optional. Erzwingt Dry-Run nur für diesen Lauf.
      required: false
      selector:
        boolean:
    all_documents:
      name: All Documents Override
      description: Optional. Erzwingt --all-documents nur für diesen Lauf.
      required: false
      selector:
        boolean:
    max_documents:
      name: Max Documents Override
      description: Optional. Überschreibt max. Dokumentanzahl nur für diesen Lauf (0 = YAML-Wert).
      required: false
      selector:
        number:
          min: 0
          max: 5000
          mode: box
    backfill_existing_documents:
      name: Bestandsdaten-Backfill
      description: Optional. Durchläuft die bereits eingelesene Paperless-Datenbank erneut, um neue Zusatzfunktionen wie Steuer- und SecondBrain-Felder zu befüllen. Bereits KI-getaggte Dokumente werden dabei nur anreichernd aktualisiert.
      required: false
      default: false
      selector:
        boolean:

restart:
  name: Paperless KIplus Lauf neu starten
  description: Stoppt einen laufenden oder pausierten Lauf, verwirft den alten Resume-Stand und startet frisch neu. Standardmäßig wird dabei der zuletzt bekannte Modus übernommen, zum Beispiel ein Bestandsdaten-Backfill.
  fields:
    entry_id:
      name: Entry ID
      description: Optional. Führt den Neustart nur für diese Integration-Instanz aus.
      example: "abcd1234"
      required: false
      selector:
        text:
    force:
      name: Force
      description: Ignoriert Cooldown-Sperren beim frischen Neustart.
      required: false
      default: true
      selector:
        boolean:
    wait:
      name: Wait
      description: Wartet synchron, bis der Neustart angestoßen wurde und der neue Lauf aktiv ist.
      required: false
      default: false
      selector:
        boolean:
    backfill_existing_documents:
      name: Bestandsdaten-Backfill
      description: Optional. Erzwingt beim Neustart explizit den Backfill-Modus. Ohne Angabe wird der letzte bekannte Modus übernommen.
      required: false
      selector:
        boolean:

stop:
  name: Paperless KIplus Lauf pausieren
  description: Fordert einen kontrollierten Stop an. Der aktuelle Lauf pausiert nach dem aktuellen Dokument oder Batch und kann später fortgesetzt werden.
  fields:
    entry_id:
      name: Entry ID
      description: Optional. Pausiert nur diese Integration-Instanz.
      example: "abcd1234"
      required: false
      selector:
        text:

stop_now:
  name: Paperless KIplus Lauf sofort stoppen
  description: Beendet den aktuell laufenden Prozess sofort. Wenn bereits Fortschrittsevents gespeichert wurden, bleibt ein Resume-Zustand für eine spätere Fortsetzung erhalten.
  fields:
    entry_id:
      name: Entry ID
      description: Optional. Stoppt nur diese Integration-Instanz sofort.
      example: "abcd1234"
      required: false
      selector:
        text:

resume:
  name: Paperless KIplus Lauf fortsetzen
  description: Setzt einen zuvor pausierten Lauf anhand der gespeicherten Resume-Datei fort.
  fields:
    entry_id:
      name: Entry ID
      description: Optional. Setzt nur diese Integration-Instanz fort.
      example: "abcd1234"
      required: false
      selector:
        text:
    force:
      name: Force
      description: Standardmäßig aktiv. Ignoriert beim Resume einen noch laufenden Cooldown.
      required: false
      default: true
      selector:
        boolean:
    wait:
      name: Wait
      description: Wartet synchron bis der Fortsetzungslauf wieder beendet oder erneut pausiert ist.
      required: false
      default: false
      selector:
        boolean:

export_config:
  name: Paperless KIplus Worker-Konfiguration exportieren
  description: Exportiert die effektive Home-Assistant-Konfiguration als lauffähige Worker-YAML und kann sie optional direkt an einen Remote-Worker übertragen.
  fields:
    entry_id:
      name: Entry ID
      description: Optional. Exportiert nur für diese Integration-Instanz.
      example: "abcd1234"
      required: false
      selector:
        text:
    remote_upload:
      name: Direkt zum Worker übertragen
      description: Wenn aktiv, wird die exportierte YAML nach dem lokalen Export direkt per API an den Remote-Worker hochgeladen.
      required: false
      default: false
      selector:
        boolean:

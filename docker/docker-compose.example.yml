x-broker:
  heimdall:
    enabled: true

services:
  paperless-kiplus-worker:
    image: ghcr.io/feberdin/paperless-kiplus-worker:latest
    container_name: paperless-kiplus-worker
    restart: unless-stopped
    labels:
      unraid-deploy-broker.heimdall.enabled: "true"
      unraid-deploy-broker.heimdall.probe.enabled: "true"
      unraid-deploy-broker.heimdall.probe.path: "/api/heimdall/v1"
    ports:
      - "8787:8787"
    environment:
      PAPERLESS_KIPLUS_DATA_DIR: /data
      PAPERLESS_KIPLUS_HOST: 0.0.0.0
      PAPERLESS_KIPLUS_PORT: 8787
      PAPERLESS_KIPLUS_TOKEN: secret://PAPERLESS_KIPLUS_TOKEN
    volumes:
      - ./worker-data:/data

    # Für lokale Entwicklung im Repo kannst du alternativ direkt aus dem
    # Checkout bauen:
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile

  # Optional helper for a local OpenAI-compatible endpoint.
  # Use it by pointing tax_ai_base_url or ai_base_url in config.yaml to
  # http://ollama:11434/v1 and using a model name that exists in Ollama.
  ollama:
    image: ollama/ollama:latest
    container_name: paperless-kiplus-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-data:/root/.ollama
